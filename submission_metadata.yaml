Methodology_Summary: |
  I built a 2-step Local AI Pipeline. First, I pre-computed candidate text into dense vectors using 'all-MiniLM-L6-v2' to bypass the 5-minute compute limit. Second, I used Cosine Similarity for semantic matching against the JD. Finally, I applied a Behavioral Multiplier (response rate) and a Honeypot Penalty (marketing/HR titles) to filter out bad profiles and active traps.

